# DailyHotApi - Nginx 配置
# 域名: dailyhot.runfast.xyz
# 后端: localhost:15000
#
# 部署步骤:
#   1. sudo cp this_file /etc/nginx/sites-available/dailyhot.runfast.xyz.conf
#   2. sudo ln -s /etc/nginx/sites-available/dailyhot.runfast.xyz.conf /etc/nginx/sites-enabled/
#   3. sudo nginx -t && sudo nginx -s reload
#   4. sudo certbot --nginx -d dailyhot.runfast.xyz
#
# Certbot 会自动修改此文件添加 SSL 配置块

server {
    listen 80;
    listen [::]:80;
    server_name dailyhot.runfast.xyz;

    # Certbot 申请证书后会自动添加 301 重定向到 HTTPS
    # 首次部署先用 HTTP，certbot --nginx 会自动改写

    location / {
        proxy_pass http://127.0.0.1:15000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;

        # 超时设置（部分平台接口响应较慢）
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 访问日志
    access_log /var/log/nginx/dailyhot.access.log;
    error_log /var/log/nginx/dailyhot.error.log;
}

