# DailyHotApi - Nginx 完整 HTTPS 配置（手动版）
# 适用于：已有 runfast.xyz 通配符证书 或 已通过 certbot 申请独立证书
#
# 如果 ECS 上已有 *.runfast.xyz 通配符证书，直接复用:
#   ssl_certificate /etc/letsencrypt/live/runfast.xyz/fullchain.pem;
#   ssl_certificate_key /etc/letsencrypt/live/runfast.xyz/privkey.pem;
#
# 如果需要独立证书:
#   sudo certbot --nginx -d dailyhot.runfast.xyz
#   (certbot 会自动修改 HTTP 版配置文件)

# HTTP → HTTPS 重定向
server {
    listen 80;
    listen [::]:80;
    server_name dailyhot.runfast.xyz;
    return 301 https://$host$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dailyhot.runfast.xyz;

    # --- SSL 证书 ---
    # 方式一：复用已有通配符证书（推荐，如果有的话）
    # ssl_certificate /etc/letsencrypt/live/runfast.xyz/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/runfast.xyz/privkey.pem;

    # 方式二：独立子域名证书（certbot 自动生成）
    ssl_certificate /etc/letsencrypt/live/dailyhot.runfast.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dailyhot.runfast.xyz/privkey.pem;

    # Let's Encrypt 推荐的 SSL 参数
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --- 反向代理 ---
    location / {
        proxy_pass http://127.0.0.1:15000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;

        # 超时设置
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    # --- 安全 ---
    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # --- 日志 ---
    access_log /var/log/nginx/dailyhot.access.log;
    error_log /var/log/nginx/dailyhot.error.log;
}
